name = "penumbra-api"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Serve the Worker at api.penumbra.page (requires the penumbra.page zone on your
# Cloudflare account). `wrangler deploy` provisions the custom domain.
[[routes]]
pattern = "api.penumbra.page"
custom_domain = true

# Run `wrangler d1 create penumbra` and paste the returned database_id here.
[[d1_databases]]
binding = "DB"
database_name = "penumbra"
database_id = "28d20030-ff71-47fd-a028-70375bab004a"
migrations_dir = "migrations"

# Pasted-image storage. Create with: wrangler r2 bucket create penumbra-uploads
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "penumbra-uploads"

# Periodic flush of changed response docs into the repo (needs GITHUB_TOKEN).
[triggers]
crons = ["*/30 * * * *"]

# ---- production values (used by `wrangler deploy`) ----
# Local `wrangler dev` overrides these via worker/.dev.vars (gitignored).
[vars]
SITE_ORIGIN = "https://penumbra.page"        # CORS: the static site origin
PUBLIC_API_BASE = "https://api.penumbra.page" # this Worker's public URL (annotation ids)
DEV_LOGIN = "true"                            # TEMPORARY passthrough sign-in (no email): /auth/email/start
                                              # returns the magic link directly so readers sign in instantly.
                                              # Revert to "false" once ZeptoMail sending is confirmed.
                                              # While true, anyone can sign in as any address (incl. the author) unverified.
MAIL_FROM = "Penumbra <noreply@penumbra.page>"  # must be on your ZeptoMail-verified domain
AUTHOR_IDS = "email:joshua@huttj.com"         # your identity → replies badged "author"
GITHUB_REPO = "huttj/penumbra"                # write-back target for submitted responses
GITHUB_BRANCH = "main"
# GITHUB_TOKEN is a secret: wrangler secret put GITHUB_TOKEN (fine-grained PAT, Contents: R/W)
